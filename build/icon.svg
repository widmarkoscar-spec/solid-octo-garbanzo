<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6b3c"/>
      <stop offset="100%" stop-color="#0d4a27"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf6f"/>
      <stop offset="100%" stop-color="#2e8b4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Subtle inner highlight at top -->
  <rect width="256" height="100" rx="48" ry="48" fill="white" opacity="0.05"/>

  <!-- Golf green (oval) -->
  <ellipse cx="128" cy="178" rx="88" ry="28" fill="url(#green)" filter="url(#shadow)"/>

  <!-- Green edge highlight -->
  <ellipse cx="128" cy="172" rx="88" ry="24" fill="none" stroke="#6dcf8e" stroke-width="2" opacity="0.4"/>

  <!-- Hole (dark circle on green) -->
  <ellipse cx="128" cy="178" rx="10" ry="5" fill="#0a3018"/>

  <!-- Flag pole -->
  <line x1="128" y1="178" x2="128" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Flag (waving triangle) -->
  <polygon points="128,72 192,96 128,118" fill="#e8413a"/>
  <!-- Flag shine -->
  <polygon points="128,72 192,96 160,84" fill="#f06a64" opacity="0.5"/>
</svg>
